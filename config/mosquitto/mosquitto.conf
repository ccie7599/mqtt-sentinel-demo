# Mosquitto Configuration for MQTT Sentinel Demo

# General settings
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Default listener (unencrypted for demo)
listener 1883
protocol mqtt
allow_anonymous false
password_file /mosquitto/config/password.txt

# WebSocket listener
listener 9001
protocol websockets
allow_anonymous false
password_file /mosquitto/config/password.txt

# TLS listener (configure certificates for production)
# listener 8883
# protocol mqtt
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false

# Connection limits
max_connections -1
max_inflight_messages 20
max_queued_messages 1000

# Message size limit (100KB)
message_size_limit 102400

# Keep alive settings
max_keepalive 300

# Logging
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
