# Prometheus Configuration for MQTT Sentinel Demo

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'mqtt-sentinel-demo'

# Alerting configuration (optional)
alerting:
  alertmanagers: []

# Rule files (optional)
rule_files: []

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # NATS server metrics (if available)
  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
    metrics_path: /metrics
    scrape_interval: 10s

  # MQTT Sentinel components (placeholder targets)
  # Update these with actual service endpoints
  - job_name: 'sentinel-auth'
    static_configs:
      - targets: ['auth-callout:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'sentinel-inspector'
    static_configs:
      - targets: ['inspector:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'sentinel-bridge'
    static_configs:
      - targets: ['bridge:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  # Node exporter for system metrics (optional)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
