# MQTT Sentinel Demo Stack
#
# This docker-compose file sets up the observability components
# for the MQTT Sentinel demo environment.
#
# Usage:
#   docker-compose up -d
#
# Services:
#   - Grafana: Dashboards at http://localhost:3000
#   - Prometheus: Metrics at http://localhost:9090
#   - Mosquitto: MQTT broker at localhost:1883

version: '3.8'

services:
  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:10.2.0
    container_name: sentinel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=sentinel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboards:/etc/grafana/provisioning/dashboards/sentinel
      - ./config/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./config/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - prometheus
    networks:
      - sentinel-network
    restart: unless-stopped

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sentinel-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - sentinel-network
    restart: unless-stopped

  # Mosquitto - MQTT broker for demo
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: sentinel-mosquitto
    ports:
      - "1883:1883"
      - "8883:8883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./config/mosquitto/password.txt:/mosquitto/config/password.txt
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - sentinel-network
    restart: unless-stopped

  # PostgreSQL - Authentication database
  postgres:
    image: postgres:15-alpine
    container_name: sentinel-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel-demo
      - POSTGRES_DB=mqtt_sentinel
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sentinel-network
    restart: unless-stopped

volumes:
  grafana-data:
  prometheus-data:
  mosquitto-data:
  mosquitto-log:
  postgres-data:

networks:
  sentinel-network:
    driver: bridge
